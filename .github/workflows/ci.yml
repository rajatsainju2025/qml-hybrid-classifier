name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pennylane==0.38.0
          pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu
          pip install scikit-learn==1.5.0 scikit-optimize==0.10.1
          pip install numpy==1.26.4 scipy==1.13.1 pandas==2.2.2
          pip install mlflow==2.13.2 matplotlib==3.9.0 seaborn==0.13.2
          pip install pyyaml==6.0.1 tqdm==4.66.4
          pip install pytest==8.2.2 pytest-cov==5.0.0 flake8==7.0.0 black==24.4.2
          pip install -e .

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ experiments/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git

      - name: Format check with black
        run: |
          black --check src/ tests/ experiments/

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=src/qml_hybrid --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
